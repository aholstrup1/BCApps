name: Rerun Unstable Failures
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions: read-all

defaults:
  run:
    shell: pwsh

jobs:
  RerunUnstableFailures:
    runs-on: ubuntu-slim
    permissions:
      actions: write
      contents: read
    env:
      GH_TOKEN: ${{ secrets.YOURPAT }}
      MAX_FAILED_JOBS: 3
      LOOKBACK_HOURS: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rerun unstable failures
        run: |
          build/scripts/RerunUnstableFailures.ps1 `
            -Owner "microsoft" `
            -Repo "BCApps" `
            -MaxFailedJobs $env:MAX_FAILED_JOBS `
            -LookbackHours $env:LOOKBACK_HOURS `
            -WhatIf
