name: Rerun Unstable Failures
on:
  workflow_dispatch:
    inputs:
      WhatIf:
        description: 'Log what would be rerun without actually rerunning'
        type: boolean
        default: true
  schedule:
    - cron: '0 * * * *'

permissions: read-all

defaults:
  run:
    shell: pwsh

jobs:
  RerunUnstableFailures:
    runs-on: ubuntu-slim
    permissions:
      actions: write
      contents: read
    env:
      GH_TOKEN: ${{ secrets.YOURPAT }}
      MAX_FAILED_JOBS: 3
      LOOKBACK_HOURS: 24
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rerun unstable failures
        run: |
          $whatIf = '${{ inputs.WhatIf }}'
          $params = @{
            Owner = "microsoft"
            Repo = "BCApps"
            MaxFailedJobs = $env:MAX_FAILED_JOBS
            LookbackHours = $env:LOOKBACK_HOURS
          }
          if ($whatIf -ne 'false') { $params.WhatIf = $true }
          build/scripts/RerunUnstableFailures.ps1 @params
